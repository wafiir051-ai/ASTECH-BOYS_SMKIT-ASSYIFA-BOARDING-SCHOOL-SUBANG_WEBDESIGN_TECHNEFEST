<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Memory Card</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;color:#fff}
h1{font-size:22px;color:#34d399;letter-spacing:4px;margin-bottom:8px}
#ui{display:flex;gap:20px;margin-bottom:16px;font-size:13px}
.stat{background:rgba(255,255,255,0.05);padding:5px 14px;border:1px solid rgba(255,255,255,0.1)}
#board{display:grid;grid-template-columns:repeat(6,80px);gap:8px}
.card{width:80px;height:80px;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:#1a1a3a;transition:all 0.3s;user-select:none;border-radius:4px}
.card.flip{background:#2a2a5a;border-color:rgba(52,211,153,0.4)}
.card.match{background:rgba(52,211,153,0.1);border-color:#34d399;cursor:default}
#msg{margin-top:14px;font-size:16px;font-weight:bold;height:24px;color:#34d399}
button{margin-top:8px;background:#34d399;color:#022c22;border:none;padding:8px 24px;font-size:12px;font-weight:bold;letter-spacing:2px;cursor:pointer;font-family:monospace}
</style></head><body>
<h1>🃏 MEMORY CARD</h1>
<div id="ui"><div class="stat">🔄 Moves: <b id="mv">0</b></div><div class="stat">✅ Match: <b id="mt">0</b>/18</div><div class="stat">⏱ <b id="tm">0</b>s</div></div>
<div id="board"></div>
<div id="msg"></div>
<button onclick="init()">↺ NEW GAME</button>
<script>
const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🌸','🍕'];
let cards,flipped,matched,moves,lock,timer,t;
function init(){
  clearInterval(timer);t=0;moves=0;matched=0;flipped=[];lock=false;
  document.getElementById('mv').textContent=0;document.getElementById('mt').textContent='0';document.getElementById('tm').textContent=0;document.getElementById('msg').textContent='';
  const pairs=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-0.5);
  cards=pairs.map((e,i)=>({id:i,emoji:e,flip:false,match:false}));
  render();
  timer=setInterval(()=>{t++;document.getElementById('tm').textContent=t;},1000);
}
function click(i){
  if(lock||cards[i].flip||cards[i].match)return;
  cards[i].flip=true;flipped.push(i);render();
  if(flipped.length===2){lock=true;moves++;document.getElementById('mv').textContent=moves;
    const[a,b]=flipped;
    if(cards[a].emoji===cards[b].emoji){cards[a].match=cards[b].match=true;matched++;document.getElementById('mt').textContent=matched;flipped=[];lock=false;
      if(matched===18){clearInterval(timer);document.getElementById('msg').textContent=`🎉 WIN! ${moves} moves, ${t}s`;}}
    else setTimeout(()=>{cards[a].flip=cards[b].flip=false;flipped=[];lock=false;render();},900);}
}
function render(){
  const b=document.getElementById('board');b.innerHTML='';
  cards.forEach((c,i)=>{const d=document.createElement('div');d.className='card'+(c.flip||c.match?' flip':'')+(c.match?' match':'');
    d.textContent=c.flip||c.match?c.emoji:'';d.onclick=()=>click(i);b.appendChild(d);});
}
init();
</script></body></html>

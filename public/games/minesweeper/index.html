<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#fff}
h1{font-size:24px;margin-bottom:8px;color:#34d399;letter-spacing:3px}
#info{display:flex;gap:20px;margin-bottom:12px;font-size:14px}
.stat{background:rgba(255,255,255,0.05);padding:6px 16px;border:1px solid rgba(255,255,255,0.1)}
#board{display:grid;gap:2px;margin-bottom:12px}
.cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;cursor:pointer;border:none;background:#2a2a4a;color:#fff;transition:background 0.1s}
.cell:hover{background:#3a3a6a}
.cell.open{background:#0a0a1a;cursor:default}
.cell.flag{background:#2a2a4a;color:#f59e0b}
.cell.mine{background:#7f1d1d;color:#f87171}
.c1{color:#3b82f6}.c2{color:#34d399}.c3{color:#f87171}.c4{color:#8b5cf6}.c5{color:#ef4444}.c6{color:#06b6d4}.c7{color:#f97316}.c8{color:#9ca3af}
#msg{font-size:18px;font-weight:bold;min-height:28px;margin-bottom:8px}
button#restart{background:#34d399;color:#022c22;border:none;padding:8px 24px;font-size:13px;font-weight:bold;letter-spacing:2px;cursor:pointer;font-family:monospace}
</style></head><body>
<h1>💣 MINESWEEPER</h1>
<div id="info">
  <div class="stat">💣 <span id="mcount">40</span></div>
  <div class="stat">🚩 <span id="fcount">0</span></div>
  <div class="stat">⏱ <span id="timer">0</span>s</div>
</div>
<div id="msg"></div>
<div id="board"></div>
<button id="restart" onclick="init()">↺ NEW GAME</button>
<script>
const R=16,C=16,M=40;
let board,revealed,flagged,gameOver,first,timerI,t,flags;
function init(){
  clearInterval(timerI);t=0;flags=0;gameOver=false;first=true;
  board=Array(R).fill(0).map(()=>Array(C).fill(0));
  revealed=Array(R).fill(0).map(()=>Array(C).fill(false));
  flagged=Array(R).fill(0).map(()=>Array(C).fill(false));
  document.getElementById('msg').textContent='';
  document.getElementById('fcount').textContent='0';
  document.getElementById('timer').textContent='0';
  document.getElementById('mcount').textContent=M;
  render();
}
function placeMines(sr,sc){
  let placed=0;
  while(placed<M){const r=Math.floor(Math.random()*R),c=Math.floor(Math.random()*C);
    if(board[r][c]===0&&!(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)){board[r][c]=-1;placed++;}}
  for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(board[r][c]!==-1){let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<R&&nc>=0&&nc<C&&board[nr][nc]===-1)n++;}board[r][c]=n;}
}
function reveal(r,c){
  if(r<0||r>=R||c<0||c>=C||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);
}
function click(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(first){placeMines(r,c);first=false;timerI=setInterval(()=>{t++;document.getElementById('timer').textContent=t;},1000);}
  if(board[r][c]===-1){revealed[r][c]=true;gameOver=true;clearInterval(timerI);
    document.getElementById('msg').textContent='💥 GAME OVER!';
    document.getElementById('msg').style.color='#f87171';
    for(let i=0;i<R;i++)for(let j=0;j<C;j++)if(board[i][j]===-1)revealed[i][j]=true;
  }else{reveal(r,c);checkWin();}render();
}
function rclick(e,r,c){e.preventDefault();
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];flags+=flagged[r][c]?1:-1;
  document.getElementById('fcount').textContent=flags;render();
}
function checkWin(){
  let un=0;for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(!revealed[r][c]&&board[r][c]!==-1)un++;
  if(un===0){gameOver=true;clearInterval(timerI);document.getElementById('msg').textContent='🎉 YOU WIN! '+t+'s';document.getElementById('msg').style.color='#34d399';}
}
function render(){
  const b=document.getElementById('board');
  b.style.gridTemplateColumns=`repeat(${C},36px)`;
  b.innerHTML='';
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const d=document.createElement('button');d.className='cell';
    if(revealed[r][c]){d.classList.add(board[r][c]===-1?'mine':'open');
      d.textContent=board[r][c]===-1?'💣':(board[r][c]>0?board[r][c]:'');
      if(board[r][c]>0)d.classList.add('c'+board[r][c]);
    }else if(flagged[r][c]){d.classList.add('flag');d.textContent='🚩';}
    d.onclick=()=>click(r,c);d.oncontextmenu=(e)=>rclick(e,r,c);
    b.appendChild(d);}
}
init();
</script></body></html>
